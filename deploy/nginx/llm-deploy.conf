# OpenAI-compatible API under nginx → uvicorn on 127.0.0.1:8000
# Repo checkout: .../libs/llm_deploy (underscore), not llm-deploy.
#
# Placeholder __CERTBOT_DOMAIN__ must be replaced with your FQDN (scripts do this).
# Before TLS files exist on disk, install only the first server { } block (HTTP) — see deploy.sh / certbot-init.sh
#
# Prerequisites:
#   - App: API_PREFIX=/api, uvicorn 127.0.0.1:8000
#
# Install (Debian/Ubuntu):
#   sudo cp deploy/nginx/llm-deploy.conf /etc/nginx/sites-available/llm-deploy
#   sudo ln -sf /etc/nginx/sites-available/llm-deploy /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# TLS:
#   sudo ./deploy/certbot-init.sh api.example.com you@example.com
#   sudo ./deploy/certbot-renew.sh

server {
    # No default_server — avoids clash with sites-enabled/default (same for :443 below).
    listen 80;
    listen [::]:80;
    server_name __CERTBOT_DOMAIN__;

    client_max_body_size 25m;

    location / {
        proxy_pass http://127.0.0.1:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # SSE / streaming chat completions
        proxy_buffering off;
        proxy_cache off;
        gzip off;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    location = /nginx-health {
        default_type text/plain;
        return 200 "nginx ok\n";
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name __CERTBOT_DOMAIN__;

    ssl_certificate     /etc/letsencrypt/live/__CERTBOT_DOMAIN__/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/__CERTBOT_DOMAIN__/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    client_max_body_size 25m;

    location / {
        proxy_pass http://127.0.0.1:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_buffering off;
        proxy_cache off;
        gzip off;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    location = /nginx-health {
        default_type text/plain;
        return 200 "nginx ok\n";
    }
}
